version: '3.8'

services:
  video-wall:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bbox-video-wall
    image: bbox-vid-wall
    
    # Use host network to access external RTSP streams
    network_mode: host
    
    # Environment variables
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=production
    
    # Volume mounts
    volumes:
      # Config files
      - ./config.yaml:/app/config.yaml:rw
      # Test videos for dev mode
      - ./test_videos:/app/test_videos:ro
      # Recordings for save mode
      - ./recordings:/app/recordings:rw
      # Optional: persist logs
      - ./logs:/app/logs
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    
    # Restart policy
    restart: unless-stopped
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Security options
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
